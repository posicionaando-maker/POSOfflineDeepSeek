<!DOCTYPE html>
<html lang="es">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="/POSOfflineDeepSeek/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="POS Pro">
    <title>Enlace POS Pro - Sistema de Punto de Venta</title>
    <link rel="manifest" href="/POSOfflineDeepSeek/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="description" content="Sistema POS profesional para gestión de ventas">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-animation { animation: slideIn 0.3s ease-out; }
        .product-card { transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <!-- Manejador global de errores -->
    <script>
        window.addEventListener('error', function(e) {
            console.error('Error global:', e.error);
            if (e.message && e.message.includes('ServiceWorker')) {
                console.log('Error relacionado con Service Worker - ignorando');
                e.preventDefault();
            }
        });
        
        window.addEventListener('unhandledrejection', function(e) {
            console.error('Promise rechazada:', e.reason);
            if (e.reason && e.reason.toString().includes('ServiceWorker')) {
                e.preventDefault();
            }
        });
    </script>

    <!-- Indicador de estado offline -->
    <div id="offline-indicator" class="hidden bg-red-500 text-white text-center p-2 text-sm font-semibold">
        <i class="fas fa-wifi mr-2"></i> Modo offline - Los datos se guardarán localmente
    </div>

    <!-- Barra de navegación -->
    <nav class="bg-indigo-700 p-4 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-store text-2xl"></i>
                <h1 class="text-xl font-bold italic">Enlace POS Pro</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="verCarrito()" class="bg-indigo-600 px-3 py-1 rounded text-sm hover:bg-indigo-500 relative">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center">0</span>
                </button>
                <button onclick="importarDesdeGoogle()" class="bg-indigo-600 px-3 py-1 rounded text-sm hover:bg-indigo-500">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="container mx-auto px-4 mt-6">
        <div id="categorias" class="flex gap-2 mb-4 overflow-x-auto pb-2">
            <button onclick="filtrarPorCategoria('todos')" class="categoria-btn bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold whitespace-nowrap">
                Todos
            </button>
        </div>
        <div id="lista-productos" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <div class="col-span-full text-center py-10 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-2"></i>
                <p>Cargando productos...</p>
            </div>
        </div>
    </div>

    <!-- Barra de carrito fija -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 shadow-2xl flex justify-between items-center">
        <div class="flex-1">
            <p class="text-xs text-gray-500 uppercase font-semibold">Total a cobrar</p>
            <p class="text-2xl font-black text-indigo-700">$<span id="total-display">0.00</span></p>
            <p class="text-xs text-gray-400 mt-1">
                <span id="items-count">0</span> items en carrito
            </p>
        </div>
        <div class="flex gap-2">
            <button onclick="reiniciar()" class="bg-gray-200 p-4 rounded-lg text-gray-600 hover:bg-gray-300 transition">
                <i class="fas fa-trash-alt"></i>
            </button>
            <button onclick="cobrar()" class="bg-green-600 text-white px-8 py-4 rounded-lg font-bold shadow-lg hover:bg-green-700 transition">
                <i class="fas fa-credit-card mr-2"></i>COBRAR
            </button>
        </div>
    </div>

    <!-- Modal de carrito -->
    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-md w-full max-h-[80vh] flex flex-col">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold"><i class="fas fa-shopping-cart mr-2"></i>Carrito de compras</h2>
                <button onclick="cerrarModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times text-2xl"></i>
                </button>
            </div>
            <div id="cart-items-list" class="flex-1 overflow-y-auto p-4"></div>
            <div class="p-4 border-t">
                <div class="flex justify-between mb-4">
                    <span class="font-semibold">Total:</span>
                    <span class="text-xl font-bold text-indigo-700">$<span id="cart-total">0.00</span></span>
                </div>
                <button onclick="cobrar(); cerrarModal();" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold hover:bg-green-700">
                    Proceder al cobro
                </button>
            </div>
        </div>
    </div>

    <!-- Toast para notificaciones -->
    <div id="toast-message" class="fixed top-20 right-4 bg-gray-800 text-white p-3 rounded-lg shadow-xl hidden z-50 toast-animation">
        <i class="fas fa-check-circle mr-2 text-green-400"></i>
        <span id="toast-text"></span>
    </div>

    <!-- SCRIPTS PRINCIPALES -->
    <script src="script.js?v=4"></script>
    
    <!-- FUNCIONES GLOBALES Y SERVICE WORKER -->
    <script>
        // ============================================
        // FUNCIÓN GLOBAL mostrarToast (DEFINICIÓN ÚNICA)
        // ============================================
        window.mostrarToast = function(mensaje, tipo = 'success') {
            const toast = document.getElementById('toast-message');
            if (!toast) return;
            
            const toastText = document.getElementById('toast-text');
            const icon = toast.querySelector('i');
            
            if (toastText) toastText.textContent = mensaje;
            
            if (icon) {
                const iconos = {
                    success: 'fas fa-check-circle mr-2 text-green-400',
                    error: 'fas fa-exclamation-circle mr-2 text-red-400',
                    warning: 'fas fa-exclamation-triangle mr-2 text-yellow-400'
                };
                icon.className = iconos[tipo] || iconos.success;
            }
            
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        };
        
        // ============================================
        // REGISTRO DE SERVICE WORKER (DESACTIVADO TEMPORALMENTE)
        // ============================================
        (function() {
            console.log('🚀 Verificando Service Workers...');
            
            // PRIMERO: Eliminar cualquier SW existente
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    for (let registration of registrations) {
                        console.log('🗑️ Eliminando SW:', registration.scope);
                        registration.unregister();
                    }
                });
            }
            
            // SEGUNDO: NO registrar nuevo SW hasta que todo funcione
            // El SW se activará después de que la app funcione correctamente
            
            // Verificar estado offline/online
            function updateOnlineStatus() {
                const indicator = document.getElementById('offline-indicator');
                if (!navigator.onLine && indicator) {
                    indicator.classList.remove('hidden');
                    window.mostrarToast('Modo offline - Datos locales', 'warning');
                } else if (indicator) {
                    indicator.classList.add('hidden');
                }
            }
            
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        })();
    </script>
<!-- ACTIVACIÓN DEL SERVICE WORKER (después de que la app carga) -->
<script>
    (function activarServiceWorker() {
        // Esperar a que la app esté completamente cargada
        window.addEventListener('load', function() {
            setTimeout(function() {
                if ('serviceWorker' in navigator) {
                    console.log('🚀 Activando Service Worker...');
                    
                    // Limpiar SW anteriores primero
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for (let reg of registrations) {
                            console.log('🗑️ Limpiando SW anterior:', reg.scope);
                            reg.unregister();
                        }
                        
                        // Registrar nuevo SW
                        navigator.serviceWorker.register('/POSOfflineDeepSeek/sw.js', {
                            scope: '/POSOfflineDeepSeek/'
                        }).then(function(registration) {
                            console.log('✅ Service Worker activado correctamente');
                            window.mostrarToast('App lista para uso offline', 'success');
                        }).catch(function(error) {
                            console.log('⚠️ SW no registrado:', error);
                        });
                    });
                }
            }, 2000); // Esperar 2 segundos después de cargar
        });
    })();
</script>
</body>
</html>
